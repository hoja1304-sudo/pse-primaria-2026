<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;color:#111;font-size:16px;line-height:1.55}
#app{max-width:820px;margin:0 auto;padding:16px}
/* pantallas */
.screen{display:none} .screen.active{display:block}
/* inicio */
#sc-start{text-align:center;padding:60px 20px}
#sc-start h1{font-size:1.6em;color:#1a237e;margin-bottom:8px}
#sc-start h2{font-size:1.1em;font-weight:normal;color:#555;margin-bottom:36px}
.btn-start{display:inline-block;padding:18px 40px;border:none;border-radius:10px;
  cursor:pointer;font-size:1.05em;font-weight:bold;color:#fff;background:#1565c0;line-height:1.4}
.btn-start small{display:block;font-weight:normal;font-size:.83em;margin-top:5px;opacity:.9}
.btn-start:hover{background:#0d47a1}
/* header barra */
#bar{background:#fff;border-bottom:1px solid #ddd;padding:8px 14px;
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
      position:sticky;top:0;z-index:100}
#bar-title{font-weight:bold;font-size:.95em;color:#1a237e}
#timer{font-size:1.1em;font-weight:bold;color:#333;min-width:80px;text-align:right}
#timer.red{color:#c62828}
#prog-wrap{width:100%;background:#e0e0e0;border-radius:4px;height:6px;margin-top:4px}
#prog{height:6px;background:#1565c0;border-radius:4px;width:0%;transition:width .3s}
#prog-text{font-size:.82em;color:#555;margin-top:2px}
/* item card */
.item-card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.12);
            padding:20px 22px;margin:16px 0}
.item-num{font-weight:bold;font-size:1em;color:#1a237e;margin-bottom:10px}
.item-stmt{margin-bottom:14px}
.item-stmt p{margin:6px 0}
.item-stmt table.dt{border-collapse:collapse;margin:8px auto}
.item-stmt table.dt th,.item-stmt table.dt td{border:1px solid #888;padding:7px 14px;text-align:center}
.item-stmt table.dt th{background:#f0f0f0;font-weight:bold}
.item-stmt ul{padding-left:22px;margin:6px 0}
.item-stmt .tc{text-align:center;margin:8px 0}
.item-fig{max-width:520px;width:100%;margin:10px auto;display:block}
/* opciones */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
@media(max-width:540px){.opts{grid-template-columns:1fr}}
.opt{border:2px solid #bdbdbd;border-radius:7px;padding:10px 14px;
      cursor:pointer;background:#fafafa;transition:border-color .15s,background .15s;
      display:flex;align-items:flex-start;gap:8px;font-size:.97em}
.opt:hover{border-color:#1565c0;background:#e3f2fd}
.opt.selected{border-color:#1565c0;background:#e3f2fd}
.opt.correct{border-color:#2e7d32!important;background:#e8f5e9!important}
.opt.wrong{border-color:#c62828!important;background:#ffebee!important}
.opt-lbl{font-weight:bold;min-width:22px;color:#555}
/* botones navegación */
.nav-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.btn{padding:9px 20px;border:none;border-radius:6px;cursor:pointer;font-size:.95em;font-weight:bold}
.btn-primary{background:#1565c0;color:#fff} .btn-primary:hover{background:#0d47a1}
.btn-warn{background:#e65100;color:#fff} .btn-warn:hover{background:#bf360c}
.btn-sec{background:#e0e0e0;color:#333} .btn-sec:hover{background:#bdbdbd}
/* selector ítem */
#item-sel{padding:6px 8px;border:1px solid #bbb;border-radius:5px;font-size:.92em}
/* código / patrón numérico en ítems */
.code-disp{text-align:center;font-size:1.45em;font-weight:bold;
            letter-spacing:0.18em;margin:14px 0;font-family:Arial,sans-serif}
/* resultados */
#sc-results{padding:16px 0}
.res-header{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px;
             box-shadow:0 1px 3px rgba(0,0,0,.12);text-align:center}
.res-score{font-size:2.4em;font-weight:bold;color:#1565c0}
.res-label{color:#555;margin-top:4px}
.res-blocks{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
             gap:10px;margin:14px 0}
.res-block{background:#fff;border-radius:7px;padding:12px;text-align:center;
            box-shadow:0 1px 3px rgba(0,0,0,.1)}
.res-block .rb-pct{font-size:1.6em;font-weight:bold;color:#1565c0}
.res-block .rb-name{font-size:.8em;color:#555;margin-top:2px}
.res-table{width:100%;border-collapse:collapse;font-size:.9em;background:#fff;
             border-radius:7px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.res-table th{background:#1565c0;color:#fff;padding:8px 10px;text-align:left}
.res-table td{padding:7px 10px;border-bottom:1px solid #eee}
.res-table tr:last-child td{border-bottom:none}
.correct-row td{background:#e8f5e9} .wrong-row td{background:#ffebee}
.omit-row td{background:#fff9e6}
.expl-cell{font-size:.85em;color:#444;display:none}
.expl-cell.show{display:table-cell}
/* bandera */
.btn-flag{background:none;border:none;cursor:pointer;font-size:1.1em;padding:4px 6px;
           border-radius:4px;transition:background .15s}
.btn-flag:hover{background:#fff9c4} .btn-flag.flagged{color:#f57f17}
/* ── Responsive ────────────────────────────────────────────────────────── */
body{overflow-x:hidden}
.item-stmt{overflow-x:auto}
.item-stmt .tc{overflow-x:auto}
.res-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:7px}
.res-table{min-width:360px}
#bar>div:first-child{flex:1 1 180px}
@media(max-width:700px){
  .item-fig{max-width:100%}
  .res-blocks{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
}
@media(max-width:540px){
  body{font-size:15px}
  #app{padding:10px}
  #sc-start{padding:32px 14px}
  .btn-start{padding:15px 28px;font-size:.97em;width:92%;max-width:340px}
  #bar{padding:6px 10px;gap:4px}
  #bar-title{font-size:.87em}
  #prog-text{font-size:.76em}
  #item-sel{max-width:115px;font-size:.83em;padding:4px 5px}
  #timer{font-size:.97em;min-width:62px}
  .item-card{padding:14px 12px;margin:10px 0}
  .item-num{font-size:.92em}
  .opt{padding:8px 10px;font-size:.92em}
  .btn{padding:7px 12px;font-size:.87em}
  .nav-row{gap:6px}
  .res-score{font-size:1.9em}
  .res-header{padding:16px 12px}
  .res-blocks{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px}
  .res-block{padding:9px} .res-block .rb-pct{font-size:1.35em}
  .res-block .rb-name{font-size:.74em}
  .res-table th,.res-table td{padding:6px 8px;font-size:.84em}
}
@media(max-width:380px){
  #item-sel{max-width:88px;font-size:.79em}
  .btn{padding:6px 9px;font-size:.82em}
  #timer{font-size:.9em;min-width:56px}
}
</style>
</head>

<script>
const ITEMS = [{"num": 1, "block": "Números", "stmt": "<p>Según un informe publicado por el Tribunal Supremo de Elecciones, en las últimas elecciones municipales de una provincia participaron $512\\,048$ personas.</p>\n<p>¿Cuál de las siguientes opciones representa correctamente ese número en palabras?</p>", "A": "<p>quinientos dos mil cuarenta y ocho</p>", "B": "<p>quinientos doce mil cuatrocientos ocho</p>", "C": "<p>quinientos doce mil cuarenta y ocho</p>", "D": "<p>cinco cientos doce mil cuarenta y ocho</p>", "key": "C"}, {"num": 2, "block": "Números", "stmt": "<p>En el laboratorio de la escuela, Laura midió la longitud de un cristal y anotó el resultado:</p>\n<p>\\[2 \\text{ unidades} + 5 \\text{ décimas} + 0 \\text{ centésimas} + 3 \\text{ milésimas} + 8 \\text{ diezmilésimas}\\]</p>\n<p>¿Cuál es el número decimal que representa esa medida?</p>", "A": "<p>$2{,}5308$</p>", "B": "<p>$2{,}5380$</p>", "C": "<p>$2{,}0538$</p>", "D": "<p>$2{,}5038$</p>", "key": "D"}, {"num": 3, "block": "Números", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>En un concurso escolar de recolección de materiales reciclables, el MEP otorga un trofeo al grupo que recolecte la mayor cantidad de materiales. La siguiente tabla muestra los resultados:</p>\n<div class=\"tc\"> <table class=\"dt\"><tr><th>Grupo</th><th>Materiales recolectados</th></tr><tr><td>Grupo A</td><td>$243\\,850$</td></tr><tr><td>Grupo B</td><td>$234\\,085$</td></tr><tr><td>Grupo C</td><td>$243\\,580$</td></tr><tr><td>Grupo D</td><td>$234\\,850$</td></tr></table> </div>\n<p>De acuerdo con la información anterior, ¿a cuál grupo se le otorgó el trofeo?</p>", "A": "<p>Grupo A</p>", "B": "<p>Grupo B</p>", "C": "<p>Grupo C</p>", "D": "<p>Grupo D</p>", "key": "A"}, {"num": 4, "block": "Números", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>En el día de campo de la escuela, cuatro estudiantes participaron en una competencia de salto de longitud. La siguiente tabla muestra la distancia, en metros, que saltó cada uno:</p>\n<div class=\"tc\"> <table class=\"dt\"><tr><th>Estudiante</th><th>Distancia (m)</th></tr><tr><td>Carlos</td><td>$3{,}45$</td></tr><tr><td>Mario</td><td>$3{,}54$</td></tr><tr><td>Diego</td><td>$3{,}40$</td></tr><tr><td>Pedro</td><td>$3{,}04$</td></tr></table> </div>\n<p>De acuerdo con el contexto anterior, ¿cuál opción muestra a los estudiantes ordenados de mayor a menor distancia?</p>", "A": "<p>Mario --- Carlos --- Diego --- Pedro</p>", "B": "<p>Carlos --- Mario --- Diego --- Pedro</p>", "C": "<p>Mario --- Diego --- Carlos --- Pedro</p>", "D": "<p>Mario --- Carlos --- Pedro --- Diego</p>", "key": "A"}, {"num": 5, "block": "Números", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>En una experiencia de laboratorio, Andrés midió la masa de una muestra de tierra y obtuvo $5{,}362$ gramos.</p>\n<p>De acuerdo con el contexto anterior, ¿cuál de las siguientes opciones muestra correctamente la notación desarrollada de ese número?</p>", "A": "<p>$5 + 0{,}3 + 0{,}6 + 0{,}002$</p>", "B": "<p>$5 + 3 + 0{,}06 + 0{,}002$</p>", "C": "<p>$5 + 0{,}3 + 0{,}06 + 0{,}002$</p>", "D": "<p>$5 + 0{,}3 + 0{,}06 + 0{,}02$</p>", "key": "C"}, {"num": 6, "block": "Números", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>Según el último censo, una provincia de Costa Rica tiene $340\\,520$ habitantes.</p>\n<p>De acuerdo con el contexto anterior, ¿cuál de las siguientes opciones muestra correctamente la notación desarrollada de ese número utilizando potencias de base diez?</p>", "A": "<p>$3 \\times 10^{5} + 4 \\times 10^{4} + 5 \\times 10^{3} + 2 \\times 10^{1}$</p>", "B": "<p>$3 \\times 10^{6} + 4 \\times 10^{4} + 5 \\times 10^{2} + 2 \\times 10^{1}$</p>", "C": "<p>$3 \\times 10^{5} + 4 \\times 10^{4} + 5 \\times 10^{2} + 2 \\times 10^{1}$</p>", "D": "<p>$3 \\times 10^{5} + 4 \\times 10^{4} + 5 \\times 10^{2} + 2$</p>", "key": "C"}, {"num": 7, "block": "Números", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>La siguiente tabla muestra la cantidad de kilogramos de material reciclable que recolectó una escuela durante cuatro semanas:</p>\n<div class=\"tc\"> <table class=\"dt\"><tr><th>Semana</th><th>Kilogramos recolectados</th></tr><tr><td>Semana 1</td><td>$2\\,344$</td></tr><tr><td>Semana 2</td><td>$3\\,315$</td></tr><tr><td>Semana 3</td><td>$4\\,722$</td></tr><tr><td>Semana 4</td><td>$2\\,567$</td></tr></table> </div>\n<p>De acuerdo con la información anterior, ¿en cuál semana la cantidad de kilogramos recolectados corresponde a un número múltiplo de 3 y par al mismo tiempo?</p>", "A": "<p>Semana 1</p>", "B": "<p>Semana 2</p>", "C": "<p>Semana 3</p>", "D": "<p>Semana 4</p>", "key": "C"}, {"num": 8, "block": "Números", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>En una bodega de supermercado, cada producto tiene un código de cinco dígitos que debe ser divisible entre 3 y entre 5 al mismo tiempo. Un empleado registró un producto con los primeros cuatro dígitos del código, pero olvidó el último:</p>\n<div class=\"code-disp\">2 &ensp;&ensp;4 &ensp;&ensp;1 &ensp;&ensp;___</div>\n<p>De acuerdo con el contexto anterior, ¿cuál debe ser el último dígito para que el código cumpla con la condición?</p>", "A": "<p>$0$</p>", "B": "<p>$2$</p>", "C": "<p>$5$</p>", "D": "<p>$8$</p>", "key": "C"}, {"num": 9, "block": "Números", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>Una empresa de seguridad utiliza números primos como claves de acceso. La siguiente tabla muestra cuatro claves candidatas:</p>\n<div class=\"tc\"> <table class=\"dt\"><tr><th>Clave</th><th>Número</th></tr><tr><td>Clave 1</td><td>$51$</td></tr><tr><td>Clave 2</td><td>$53$</td></tr><tr><td>Clave 3</td><td>$57$</td></tr><tr><td>Clave 4</td><td>$63$</td></tr></table> </div>\n<p>De acuerdo con el contexto anterior, ¿cuál es la clave que se debe elegir?</p>", "A": "<p>Clave 1</p>", "B": "<p>Clave 2</p>", "C": "<p>Clave 3</p>", "D": "<p>Clave 4</p>", "key": "B"}, {"num": 10, "block": "Números", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>Para celebrar el Día del Ambiente, un vivero quiere donar sus plantas para sembrarlas en partes iguales en cinco parques de la ciudad. La siguiente tabla muestra la cantidad de plantas de cada vivero:</p>\n<div class=\"tc\"> <table class=\"dt\"><tr><th>Vivero</th><th>Total de plantas</th></tr><tr><td>Vivero A</td><td>$327$</td></tr><tr><td>Vivero B</td><td>$325$</td></tr><tr><td>Vivero C</td><td>$331$</td></tr><tr><td>Vivero D</td><td>$338$</td></tr></table> </div>\n<p>Las condiciones que debe cumplir el vivero elegido son: <ul><li>Cada parque recibe la misma cantidad de plantas.</li><li>No debe sobrar ninguna planta.</li></ul></p>\n<p>De acuerdo con la información anterior, ¿cuál vivero debe hacer la donación?</p>", "A": "<p>Vivero A</p>", "B": "<p>Vivero B</p>", "C": "<p>Vivero C</p>", "D": "<p>Vivero D</p>", "key": "B"}, {"num": 11, "block": "Números", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>La siguiente tabla muestra la cantidad de kilómetros que recorrió cada persona durante un entrenamiento en bicicleta:</p>\n<div class=\"tc\"> <table class=\"dt\"><tr><th>Persona</th><th>Kilómetros recorridos</th></tr><tr><td>Ana</td><td>$13{,}5$</td></tr><tr><td>Luis</td><td>$9{,}25$</td></tr><tr><td>Rosa</td><td>$11{,}75$</td></tr><tr><td>Marco</td><td>$8{,}5$</td></tr></table> </div>\n<p>De acuerdo con la información anterior, ¿cuántos kilómetros recorrieron en total las cuatro personas durante ese entrenamiento?</p>", "A": "<p>$43{,}00$</p>", "B": "<p>$42{,}50$</p>", "C": "<p>$43{,}50$</p>", "D": "<p>$34{,}50$</p>", "key": "A"}, {"num": 12, "block": "Números", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>En una clase de ciencias, la maestra explicó que el área de un cuadrado con lado de $5\\,\\text{cm}$ se puede expresar como $5^{2}$, y que el volumen de un cubo con arista de $5\\,\\text{cm}$ se puede expresar como $5^{3}$.</p>\n<p>De acuerdo con el contexto anterior, ¿cuál es el volumen del cubo?</p>", "A": "<p>$15\\,\\text{cm}^{3}$</p>", "B": "<p>$25\\,\\text{cm}^{3}$< ctos</td></tr><tr><td>Figura B</td><td>Lados opuestos iguales y cuatro ángulos rectos</td></tr><tr><td>Figura C</td><td>Lados opuestos iguales, sin ángulos rectos y lados no todos iguales entre sí</td></tr><tr><td>Figura D</td><td>Cuatro lados iguales, sin ángulos rectos</td></tr></table> </div></p>\n<p>De acuerdo con la información anterior, ¿cuál de esas figuras es un rombo?</p>", "A": "<p>Figura A</p>", "B": "<p>Figura B</p>", "C": "<p>Figura C</p>", "D": "<p>Figura D</p>", "key": "D"}, {"num": 24, "block": "Geometría", "stmt": "<p>Considere la siguiente información:</p>\n<p>En clase de matemáticas, la maestra mostró una caja con forma de prisma triangular y pidió a cuatro estudiantes que indicaran el número de caras del sólido. La siguiente tabla muestra la respuesta de cada uno:</p>\n<div class=\"tc\"> <table class=\"dt\"><tr><th>Estudiante</th><th>Número de caras</th></tr><tr><td>Ana</td><td>5</td></tr><tr><td>Beto</td><td>3</td></tr><tr><td>Carmen</td><td>6</td></tr><tr><td>Diego</td><td>4</td></tr></table> </div>\n<p>De acuerdo con la información anterior, ¿cuál estudiante indicó correctamente el número de caras del prisma triangular?</p>", "A": "<p>Ana</p>", "B": "<p>Beto</p>", "C": "<p>Carmen</p>", "D": "<p>Diego</p>", "key": "A"}, {"num": 25, "block": "Geometría", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>Una empresa fabrica cajas de cartón con forma de prisma rectangular para empacar libros. Cada caja tiene las siguientes medidas: largo $= 30\\,\\text{cm}$, ancho $= 20\\,\\text{cm}$ y alto $= 15\\,\\text{cm}$.</p>\n<p>De acuerdo con el contexto anterior, ¿cuál es el volumen de esa caja?</p>", "A": "<p>$65\\,\\text{cm}^{3}$</p>", "B": "<p>$600\\,\\text{cm}^{3}$</p>", "C": "<p>$4\\,500\\,\\text{cm}^{3}$</p>", "D": "<p>$9\\,000\\,\\text{cm}^{3}$</p>", "key": "D"}, {"num": 26, "block": "Geometría", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>Una plaza pública tiene la forma compuesta por un rectángulo y un triángulo adosado a uno de sus l s vértices están en los puntos $A(1,\\,1)$, $B(3,\\,1)$ y $C(2,\\,3)$. Se trasladó la figura <strong>4 unidades hacia la derecha y 2 unidades hacia arriba</strong>.</p>\n<p>De acuerdo con el contexto anterior, ¿cuáles son las coordenadas del nuevo vértice $A'$ después de la traslación?</p>", "A": "<p>$(5,\\ 1)$</p>", "B": "<p>$(1,\\ 3)$</p>", "C": "<p>$(3,\\ 5)$</p>", "D": "<p>$(5,\\ 3)$</p>", "key": "D"}, {"num": 34, "block": "Medidas", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>Tres ciclistas participaron juntos en una carrera de resistencia. Para mantenerse hidratados, cada ciclista bebió $250\\,\\text{mL}$ de agua cada $20$ minutos desde el inicio de la carrera. La carrera tuvo una duración total de $2$ horas.</p>\n<p>De acuerdo con el contexto anterior, ¿cuál fue la cantidad total de agua que bebieron los tres ciclistas al finalizar la carrera?</p>", "A": "<p>$2{,}25\\,\\text{L}$</p>", "B": "<p>$4{,}50\\,\\text{L}$</p>", "C": "<p>$3{,}75\\,\\text{L}$</p>", "D": "<p>$6{,}00\\,\\text{L}$</p>", "key": "B"}, {"num": 35, "block": "Medidas", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>Una estudiante de sexto grado investiga el clima de dos ciudades para un proyecto escolar. Encuentra que la temperatura en San José es de $25\\,^{\\circ}\\text{C}$, pero el sitio web de la ciudad hermana en Estados Unidos muestra las temperaturas en grados Fahrenheit. La fórmula para convertir es: \\[^{\\circ}\\text{F} = \\left(^{\\circ}\\text{C} \\times \\frac{9}{5}\\right) + 32\\]</p>\n<p>De acuerdo con el contexto anterior, ¿cuál es la temperatura de $25\\,^{\\circ}\\text{C}$ expresada en grados Fahrenheit?</p>", "A": "<p>$57\\,^{\\circ}\\text{F}$</p>", "B": "<p>$45\\,^{\\circ}\\text{F}$</p>", "C": "<p>$77\\,^{\\circ}\\text{F}$</p>", "D": "<p>$93\\,^{\\circ}\\text{F}$</p>", "key": "C"}, {"num": 36, "block": "Medidas", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>La municipalidad planea instalar césped artificial en la cancha de juegos de una escuela. El área de la cancha mide $3\\,\\text{m}^{2}$ y el proveedor cobra el precio por centímetro cuadrado. Para hacer el pedido, se necesita convertir el área a $\\text{cm}^{2}$.</p>\n<p>De acuerdo con el contexto anterior, ¿cuántos centímetros cuadrados tiene la cancha?</p>", "A": "<p>$300\\,\\text{cm}^{2}$</p>", "B": "<p>$3\\,000\\,\\text{cm}^{2}$</p>", "C": "<p>$300\\,000\\,\\text{cm}^{2}$</p>", "D": "<p>$30\\,000\\,\\text{cm}^{2}$</p>", "key": "D"}, {"num": 37, "block": "Medidas", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>Una panadería elabora pan cada mañana. Para una receta necesita $2{,}5\\,\\text{kg}$ de harina, pero la báscula solo mide en gramos. Además, el tiempo de horneado es de $1$ hora y $15$ minutos, pero el temporizador solo acepta segundos. La siguiente tabla resume los datos:</p>\n<div class=\"tc\"> <table class=\"dt\"><tr><th>Medida</th><th>Valor original</th><th>Unidad convertida</th></tr><tr><td>Harina</td><td>$2{,}5\\,\\text{kg}$</td><td>$?\\,\\text{g}$</td></tr><tr><td>Tiempo</td><td>$1\\,\\text{h}\\ 15\\,\\text{min}$</td><td>$?\\,\\text{s}$</td></tr></table> </div>\n<p>De acuerdo con el contexto anterior, ¿cuáles son los valores correctos para completar la tabla?</p>", "A": "<p>$2\\,500\\,\\text{g}$ y $4\\,500\\,\\text{s}$</p>", "B": "<p>$250\\,\\text{g}$ y $75\\,\\text{s}$</p>", "C": "<p>$25\\,000\\,\\text{g}$ y $450\\,\\text{s}$</p>", "D": "<p>$2\\,500\\,\\text{g}$ y $75\\,\\text{s}$</p>", "key": "A"}, {"num": 38, "block": "Medidas", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>Sofía tiene en su alcancía los siguientes billetes y monedas: un billete de ₡5000, dos billetes de ₡1000, tres monedas de ₡500 y cuatro monedas de ₡100.</p>\n<p>De acuerdo con el contexto anterior, ¿cuánto dinero tiene Sofía en total?</p>", "A": "<p>₡7400</p>", "B": "<p>₡8900</p>", "C": "<p>₡9400</p>", "D": "<p>₡7900</p>", "key": "B"}, {"num": 39, "block": "Medidas", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>Laura fue al banco para cambiar un billete de ₡20\\,000 en billetes de ₡2\\,000 y monedas de ₡500. Si ella recibió la misma cantidad de billetes que de monedas, ¿cuántas monedas de ₡500 recibió Laura?</p>", "A": "<p>$4$</p>", "B": "<p>$5$</p>", "C": "<p>$10$</p>", "D": "<p>$8$</p>", "key": "D"}, {"num": 40, "block": "Medidas", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>Don Gerardo vende artesanías en un mercado turístico. Un cliente extranjero quiere comprar una pieza que cuesta ₡13\\,500. El tipo de cambio del día es: $1$ dólar $=$ ₡540.</p>\n<p>De acuerdo con el contexto anterior, ¿cuántos dólares debe pagar el cliente por la artesanía?</p>", "A": "<p>$20$ dólares</p>", "B": "<p>$27$ dólares</p>", "C": "<p>$25$ dólares</p>", "D": "<p>$30$ dólares</p>", "key": "C"}, {"num": 41, "block": "Medidas", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>Para preparar un pastel de cumpleaños se necesitan los siguientes ingredientes: <ul><li>$\\dfrac{1}{4}\\,\\text{kg}$ de mantequilla</li><li>$\\dfrac{3}{4}\\,\\text{kg}$ de harina</li><li>$3$ huevos</li></ul></p>\n<p>La siguiente tabla muestra los precios en el supermercado:</p>\n<div class=\"tc\"> <table class=\"dt\"><tr><th>Ingrediente</th><th>Precio</th></tr><tr><td>Mantequilla</td><td>₡2\\,000 por kilogramo</td></tr><tr><td>Harina</td><td>₡800 por kilogramo</td></tr><tr><td>Huevo</td><td>₡200 la unidad</td></tr></table> </div>\n<p>De acuerdo con la información anterior, ¿cuál fue el monto total pagado por los ingredientes del pastel?</p>", "A": "<p>₡1\\,100</p>", "B": "<p>₡1\\,700</p>", "C": "<p>₡1\\,900</p>", "D": "<p>₡3\\,200</p>", "key": "B"}, {"num": 42, "block": "Relaciones y Álgebra", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>Un investigador estudia el crecimiento de una colonia de bacterias. Observó que la cantidad de bacterias sigue el siguiente patrón:</p>\n<div class=\"tc\"> <table class=\"dt\"><tr><th>Hora</th><th>Cantidad de bacterias</th></tr><tr><td>1</td><td>4</td></tr><tr><td>2</td><td>12</td></tr><tr><td>3</td><td>36< roductos. En la siguiente expresión, cada $\\bigstar$ representa la cantidad de productos que hay en cada estante: \\[\\bigstar + \\bigstar + \\bigstar + 9 = 45\\]</p>\n<p>De acuerdo con la información anterior, ¿cuántos productos hay en cada estante de esa tienda?</p>", "A": "<p>$9$</p>", "B": "<p>$15$</p>", "C": "<p>$12$</p>", "D": "<p>$36$</p>", "key": "C"}, {"num": 49, "block": "Relaciones y Álgebra", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>Una panadería empaca sus panes en cajas. Todas las cajas tienen la misma cantidad de panes. En la siguiente ecuación, $n$ representa la cantidad de panes que hay en cada caja: \\[n \\times 5 = 35\\]</p>\n<p>De acuerdo con la información anterior, ¿cuántos panes hay en cada caja?</p>", "A": "<p>$30$</p>", "B": "<p>$7$</p>", "C": "<p>$40$</p>", "D": "<p>$175$</p>", "key": "B"}, {"num": 50, "block": "Relaciones y Álgebra", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>Una mochila puede cargar menos de $20$ libros. Daniela ya colocó $8$ libros y quiere agregar $n$ libros más. La siguiente inecuación representa esa condición: \\[n + 8 < 20\\]</p>\n<p>De acuerdo con la información anterior, ¿cuál valor de $n$ satisface la inecuación?</p>", "A": "<p>$9$</p>", "B": "<p>$12$</p>", "C": "<p>$13$</p>", "D": "<p>$15$</p>", "key": "A"}, {"num": 51, "block": "Relaciones y Álgebra", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>En una librería hay una promoción de $25\\%$ de descuento en todos los artículos. Camila quiere comprar una mochila que cuesta ₡16\\,000.</p>\n<p>De acuerdo con el contexto anterior, ¿cuánto pagará Camila por la mochila con el descuento aplicado?</p>", "A": "<p>₡4\\,000</p>", "B": "<p>₡12\\,000</p>", "C": "<p>₡14\\,000</p>", "D": "<p>₡11\\,000</p>", "key": "B"}, {"num": 52, "block": "Relaciones y Álgebra", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>En una fábrica de jugo, una máquina llena $12$ botellas en $4$ minutos, siempre a la misma velocidad.</p>\n<p>De acuerdo con el contexto anterior, ¿cuántas botellas llena la máquina en $10$ minutos?</p>", "A": "<p>$24$</p>", "B": "<p>$36$</p>", "C": "<p>$30$</p>", "D": "<p>$48$</p>", "key": "C"}, {"num": 53, "block": "Relaciones y Álgebra", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>En una encuesta realizada en una comunidad, el $40\\%$ de los entrevistados dijo que practica deporte. Si $120$ personas dijeron que practican deporte, ¿cuántas personas fueron entrevistadas en total?</p>", "A": "<p>$48$</p>", "B": "<p>$160$</p>", "C": "<p>$180$</p>", "D": "<p>$300$</p>", "key": "D"}, {"num": 54, "block": "Estadística y Probabilidad", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>Durante una semana, Rodrigo anotó la cantidad de minutos que dedicó a leer cada día:</p>\n<div class=\"tc\"> <table class=\"dt\"><tr><th>Día</th><th>Lunes</th><th>Martes</th><th>Miércoles</th><th>Jueves</th><th>Viernes</th></tr><tr><td>Minutos</td><td>20</td><td>35</td><td>25</td><td>40</td><td>30</td></tr></table> </div>\n<p>De acuerdo con el contexto anterior, ¿cuál es la media aritmética de minutos que Rodrigo dedicó a leer por día?</p>", "A": "<p>$30$</p>", "B": "<p>$25$</p>", "C": "<p>$35$</p>", "D": "<p>$40$</p>", "key": "A"}, {"num": 55, "block": "Estadística y Probabilidad", "stmt": "<p>Considere el siguiente contexto:</p>\n<p>El siguiente gráfico de barras muestra la cantidad de libros donados a una biblioteca escolar durante cinco meses:</p>\n<p><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAA0sAAAIVCAYAAAAAt2RFAAAAOXRFWHRTb2Z0d2FyZQBNYXRwbG90bGliIHZlcnNpb24zLjkuMiwgaHR0cHM6Ly9tYXRwbG90bGliLm9yZy8hTgPZAAAACXBIWXMAABP+AAAT/gEHlDmEAAB5KklEQVR4nO3dd3xUVf7/8fedlkkmvRBqCE1FRBARRUEQFVh7Af3pKq6KYltsqytWcMWyq991FV1dwe7akFV33VVRQUVQEEFRsCEqLZBAepl6f3/EGTOZmwKTQsLr+Xjw0Nxz53PP5J5zP/cz986NYZqmKQAAAABAFFt7dwAAAAAA9kQUSwAAAABggWIJAAAAACxQLAEAAACABYolAAAAALBAsQQAAAAAFiiWAAAAAMACxRIAAAAAWKBYAgAAAAALFEsAAAAAYIFiCQAAAAAsUCw1U3l5uZYtW6by8vL27goAAACANkCx1ExffvmlDj/8cH355Zft3RUAAAAAbYBiCQAAAAAsUCwBAAAAgAWKJQAA const BLOCKS = ['Números','Geometría','Medidas','Relaciones y Álgebra','Estadística y Probabilidad'];

let curIdx = 0, answers = new Array(60).fill(null);
let flags = new Array(60).fill(false);
let timerSecs = 180*60, timerInterval = null;

// ─── Navegación de pantallas ───────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showStart() {
  clearInterval(timerInterval);
  answers.fill(null); flags.fill(false); curIdx=0;
  showScreen('sc-start');
}

// ─── Inicio de examen ──────────────────────────────────────────────────────
function startExam() {
  answers.fill(null); flags.fill(false); curIdx=0;
  buildItemSel();
  timerSecs = 180*60;
  timerInterval = setInterval(tickTimer, 1000);
  renderExamItem(0);
  showScreen('sc-exam');
}

// ─── Timer ─────────────────────────────────────────────────────────────────
function tickTimer() {
  timerSecs--;
  if (timerSecs <= 0) { clearInterval(timerInterval); finishExam(); return; }
  const h = String(Math.floor(timerSecs/3600)).padStart(1,'0');
  const m = String(Math.floor((timerSecs%3600)/60)).padStart(2,'0');
  const s = String(timerSecs%60).padStart(2,'0');
  const el = document.getElementById('timer');
  el.textContent = h+':'+m+':'+s;
  el.className = timerSecs < 600 ? 'red' : '';
}

// ─── Selector de ítem ──────────────────────────────────────────────────────
function buildItemSel() {
  const sel = document.getElementById('item-sel');
  sel.innerHTML = '';
  ITEMS.forEach((it,i) => {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = 'Ítem '+it.num;
    sel.appendChild(opt);
  });
}
function gotoItem(i) {
  curIdx = i;
  renderExamItem(i);
}

// ─── Render ítem examen ────────────────────────────────────────────────────
function renderExamItem(i) {
  curIdx = i;
  const it = ITEMS[i];
  const ans = answers[i];
  const isFlagged = flags[i];

  // Progreso
  const done = answers.filter(a=>a!==null).length;
  document.getElementById('prog').style.width = (done/60*100)+'%';
  document.getElementById('prog-text').textContent = done+' de 60 respondidos';

  const html = `
    <div class="item-card">
      <div class="item-num">
        Ítem ${it.num} &nbsp;
        <span style="font-size:.85em;color:#777;font-weight:normal">[${it.block}]</span>
        &nbsp;
        <button class="btn-flag ${isFlagged?'flagged':''}" onclick="toggleFlag(${i})"
                title="Marcar para revisar">🚩</button>
      </div>
      <div class="item-stmt">${it.stmt}</div>
      <div class="opts" id="opts-${i}">
        ${['A','B','C','D'].map(l =>
          `<div class="opt${ans===l?' selected':''}" id="opt-${i}-${l}" onclick="selectExam(${i},'${l}')">
            <span class="opt-lbl">${l})</span>
            <span>${it[l]}</span>
           </div>`
        ).join('')}
      </div>
    </div>`;

  document.getElementById('exam-item-wrap').innerHTML = html;
  document.getElementById('item-sel').value = i;
  document.getElementById('btn-prev').disabled = (i===0);
  document.getElementById('btn-next').disabled = (i===59);
  typeset();
}

function selectExam(idx, letter) {
  answers[idx] = letter;
  ['A','B','C','D'].forEach(l => {
    const el = document.getElementById('opt-'+idx+'-'+l);
    el.className = 'opt' + (l===letter?' selected':'');
  });
  const done = answers.filter(a=>a!==null).length;
  document.getElementById('prog').style.width = (done/60*100)+'%';
  document.getElementById('prog-text').textContent = done+' de 60 respondidos';
}

function examNav(dir) {
  const next = curIdx+dir;
  if (next>=0 && next<60) renderExamItem(next);
}

function toggleFlag(i) {
  flags[i] = !flags[i];
  renderExamItem(i);
}

function confirmFinish() {
  const omit = answers.filter(a=>a===null).length;
  const msg = omit>0
    ? `Tiene ${omit} ítem(s) sin responder. ¿Desea finalizar de todas formas?`
    : '¿Desea finalizar la prueba?';
  if (confirm(msg)) { clearInterval(timerInterval); finishExam(); }
}

// ─── Finalizar ─────────────────────────────────────────────────────────────
function finishExam() { buildResults(); showScreen('sc-results'); }

function buildResults() {
  let correct=0, wrong=0, omit=0;
  const blockStats = {};
  BLOCKS.forEach(b => blockStats[b]={c:0,t:0});

  ITEMS.forEach((it,i) => {
    blockStats[it.block].t++;
    if (answers[i]===null) omit++;
    else if (answers[i]===it.key) { correct++; blockStats[it.block].c++; }
    else wrong++;
  });

  const pct = Math.round(correct/60*100);
  const blockHtml = BLOCKS.map(b => {
    const s=blockStats[b];
    const p=s.t>0?Math.round(s.c/s.t*100):0;
    return `<div class="res-block"><div class="rb-pct">${p}%</div>
            <div class="rb-name">${b}<br><small>${s.c}/${s.t}</small></div></div>`;
  }).join('');

  const rows = ITEMS.map((it,i) => {
    const a=answers[i], ok=a===it.key;
    const cls = a===null?'omit-row':(ok?'correct-row':'wrong-row');
    const icon = a===null?'—':(ok?'✓':'✗');
    return `<tr class="${cls}">
      <td>${it.num}</td>
      <td>${it.block.substring(0,12)}</td>
      <td>${a||'—'}</td>
      <td>${it.key}</td>
      <td style="text-align:center">${icon}</td>
    </tr>`;
  }).join('');

  document.getElementById('results-content').innerHTML = `
    <div class="res-header">
      <div class="res-score">${correct}/60</div>
      <div class="res-label">Nota: ${pct}% &nbsp;|&nbsp;
        ✓ ${correct} correctas &nbsp;✗ ${wrong} incorrectas &nbsp;◯ ${omit} omitidas</div>
    </div>
    <div class="res-blocks">${blockHtml}</div>
    <div class="res-table-wrap">
    <table class="res-table">
      <thead><tr><th>Ítem</th><th>Bloque</th><th>Tu respuesta</th><th>Correcta</th><th>Resultado</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  typeset();
}

// ─── MathJax re-render ─────────────────────────────────────────────────────
function typeset() {
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise().catch(e => console.warn('MathJax:', e));
  }
}
</script>
